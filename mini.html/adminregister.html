<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" type="text/css" href="../style.css/adminregister.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        <!-- LOGIN PANEL (UNCHANGED) -->
        <div class="credentials-panel signin">
            <h2 class="slide-element">Login</h2>
            <form action="#" onsubmit="handleLogin(event)">
                <div class="field-wrapper slide-element">
                    <input type="email" id="loginEmail" required>
                    <label for="">Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="loginPassword" required>
                    <label for="">Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="forgot-password slide-element">
                    <a href="#">Forgot Password?</a>
                </div>

                <div class="checkbox-wrapper slide-element">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember Me</label>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Login</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> <a href="#" class="register-trigger">Register Admin</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <!-- ADMIN REGISTER PANEL -->
        <div class="credentials-panel signup">
            <h2 class="slide-element">Admin Register</h2>
            <form action="#" onsubmit="handleRegister(event)">

                <div class="field-wrapper slide-element">
                    <input type="text" id="adminName" required>
                    <label for="">Admin Name</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" id="adminEmail" required>
                    <label for="">Admin Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="tel" id="adminPhone" required>
                    <label for="">Phone Number</label>
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="adminPassword" required>
                    <label for="">Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                 <a href="../mini.html/dashboard.html"><button class="submit-button" type="submit">Register</button></a>
                </div>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> <a href="#" class="login-trigger">Sign In</a></p>
                </div>

            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME ADMIN!</h2>
        </div>

    </div>

<script>

function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const admins = JSON.parse(localStorage.getItem('registeredAdmins') || '[]');

  const admin = admins.find(a => a.email === email && a.password === password);

  if(admin){
    localStorage.setItem('currentAdmin', JSON.stringify(admin));
    localStorage.setItem('isLoggedIn', 'true');
    window.location.href="admindashboard.html";
  }else{
    alert('Invalid admin email or password');
  }
}

function handleRegister(event) {

  event.preventDefault();

  const name = document.getElementById('adminName').value;
  const email = document.getElementById('adminEmail').value;
  const phone = document.getElementById('adminPhone').value;
  const password = document.getElementById('adminPassword').value;

  const admins = JSON.parse(localStorage.getItem('registeredAdmins') || '[]');

  if(admins.find(a => a.email === email)){
      alert('Admin email already registered');
      return;
  }

  const newAdmin = {
      name:name,
      email:email,
      phone:phone,
      password:password
  };

  admins.push(newAdmin);

  localStorage.setItem('registeredAdmins', JSON.stringify(admins));
  localStorage.setItem('currentAdmin', JSON.stringify(newAdmin));
  localStorage.setItem('isLoggedIn', 'true');

  alert('Admin registration successful! Welcome ' + name);

  window.location.href="admindashboard.html";
}

</script>

<script src="../mini.js/adminregister.js"></script>

</body>
</html>
