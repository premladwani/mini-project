<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css/userdashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D background particles -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>

<canvas id="meshCanvas" style="position:fixed;top:0;left:0;z-index:-1;"></canvas>

<main class="dashboard-wrapper">
    <!-- Top Header -->
    <header class="top-header">
        <div class="header-left">
            <div class="logo-icon">📊</div>
            <div>
                <h2>Attendance Dashboard</h2>
                <p id="headerSubtitle">Welcome back!</p>
            </div>
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="action-btn theme-btn">🌙</button>
            <button id="downloadBtn" class="action-btn primary">📥 Download</button>
            <button id="resetBtn" class="action-btn danger">🔄 Reset</button>
        </div>
    </header>

    <!-- Alert Box -->
    <div id="alertBox"></div>

    <!-- User Form -->
    <section class="user-form-section">
        <div class="form-container">
            <input type="text" id="username" placeholder="Enter Your Name" class="form-input">
            <input type="text" id="rfid" placeholder="Enter RFID Card Number" class="form-input">
            <button id="saveBtn" class="submit-btn">Submit</button>
        </div>
    </section>

    <!-- Main Content Grid -->
    <div class="main-grid">
        <!-- Summary Section -->
        <section class="grid-section summary-section">
            <div class="section-title">📈 Attendance Summary</div>
            <div class="summary-card">
                <div id="resultBox">Please submit your details to view attendance summary.</div>
            </div>
        </section>

        <!-- Overview Chart -->
        <section class="grid-section chart-section">
            <div class="section-title">📊 Overview</div>
            <div class="chart-wrapper">
                <canvas id="overviewChart"></canvas>
            </div>
        </section>

        <!-- Calendar Section -->
        <section class="grid-section calendar-section">
            <div class="section-title">🗓️ Calendar & Events</div>
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth" class="month-btn">◀</button>
                    <span id="monthYear" class="month-year"></span>
                    <button id="nextMonth" class="month-btn">▶</button>
                </div>
                <div id="calendar" class="calendar-grid"></div>
            </div>
        </section>

        <!-- Weekly Chart -->
        <section class="grid-section chart-section">
            <div class="section-title">📅 Weekly Report</div>
            <div class="chart-wrapper">
                <canvas id="weeklyChart"></canvas>
            </div>
        </section>

        <!-- Monthly Chart -->
        <section class="grid-section chart-section">
            <div class="section-title">📆 Monthly Report</div>
            <div class="chart-wrapper">
                <canvas id="monthlyChart"></canvas>
            </div>
        </section>

        <!-- Notes Section -->
        <section class="grid-section notes-section">
            <div class="section-title">📝 Notes & Observations</div>
            <textarea id="notes" placeholder="Write your notes here..." class="notes-textarea"></textarea>
            <button class="save-notes-btn">💾 Save Notes</button>
        </section>
    </div>
</main>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../mini.js/userdashboard.js"></script>
</body>
</html>
